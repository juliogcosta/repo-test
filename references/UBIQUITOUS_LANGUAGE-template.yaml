# UBIQUITOUS_LANGUAGE.yaml
# Glossário Versionado - Fonte da Verdade para Linguagem Ubíqua
# Git-tracked, mantido continuamente pelo Guardião de Linguagem Ubíqua
#
# === Arquivos Relacionados (v3.2.0 — Eixo B Implementation Layer) ===
# Este arquivo é o glossário BUSINESS-CANÔNICO. Para mapeamentos:
#   - business ↔ design conceitual: claude/TERMINOLOGY_MAP.yaml
#   - design ↔ implementation (arquivo/classe): IMPLEMENTATION_MAP.yaml
# ====================================================================

metadata:
  project: "[nome_do_projeto]"  # Ex: licitacoes
  version: "1.0"
  last_updated: "YYYY-MM-DD"
  maintainer: "Guardião de Linguagem Ubíqua"
  bounded_contexts:
    - "[bc1]"  # Ex: licitacao
    - "[bc2]"  # Ex: proposta
    - "[bc3]"  # Ex: contrato

# ==============================================================================
# GLOSSÁRIO GLOBAL
# Termos compartilhados entre todos os Bounded Contexts
# ==============================================================================

global_terms:
  - term: "[Termo Global]"
    definition: "[Definição precisa e não ambígua do termo]"
    synonyms: []  # Sinônimos aceitos (usar com cautela!)
    forbidden_synonyms: ["[termo proibido]"]  # Termos que NÃO devem ser usados
    type: "[Actor | Aggregate | ValueObject | Event | Command | Process | System]"
    related_terms: ["[termo relacionado 1]", "[termo relacionado 2]"]
    examples:
      - "[Exemplo de uso correto do termo]"
    notes: "[Observações adicionais, contexto histórico, etc]"
    added_date: "YYYY-MM-DD"
    added_by: "[Nome do agente ou pessoa]"

  # EXEMPLO CONCRETO:
  - term: "Licitante"
    definition: "Pessoa jurídica (empresa) que submete proposta em processo licitatório público"
    synonyms: []
    forbidden_synonyms: ["empresa participante", "ofertante", "concorrente"]
    type: "Actor"
    related_terms: ["Proposta", "Licitacao"]
    examples:
      - "O Licitante deve cadastrar CNPJ antes de submeter Proposta"
      - "Cada Licitante pode submeter múltiplas Propostas para a mesma Licitação"
    notes: "Termo técnico da legislação de licitações públicas (Lei 14.133/2021)"
    added_date: "2026-04-15"
    added_by: "Analista de Domínio (Sofia)"

# ==============================================================================
# GLOSSÁRIO POR BOUNDED CONTEXT
# Termos específicos de cada Bounded Context (podem ter significado diferente em outro BC)
# ==============================================================================

bounded_context_terms:
  # Bounded Context 1
  "[nome_bc_1]":  # Ex: licitacao
    - term: "[Termo Específico do BC]"
      definition: "[Definição APENAS neste contexto]"
      scope: "Apenas neste BC. Em outros BCs pode ter significado diferente."
      aggregate: true  # Se for um Aggregate Root
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "[Invariante 1 protegida por este conceito]"
        - "[Invariante 2]"
      commands:
        - command: "[Comando 1]"
          event_result: "[Evento resultante]"
      examples:
        - "[Exemplo de uso neste BC]"
      notes: "[Observações]"

    # EXEMPLO CONCRETO:
    - term: "Licitacao"
      definition: "Processo formal de contratação pública, com prazos, critérios e fases regulamentadas"
      scope: "Aggregate Root do BC 'licitacao'. Em outros BCs é apenas referência (ID)."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Uma Licitação só pode ter UM vencedor"
        - "Prazo de submissão deve ser no futuro ao criar Licitação"
        - "Licitação CANCELADA não pode voltar para ABERTA"
      commands:
        - command: "Criar Licitacao"
          event_result: "Licitacao Criada"
        - command: "Cancelar Licitacao"
          event_result: "Licitacao Cancelada"
      examples:
        - "Licitação 001/2026 para aquisição de equipamentos de TI"
      notes: "Status possíveis: ABERTA, FECHADA, CANCELADA"

  # Bounded Context 2
  "[nome_bc_2]":  # Ex: proposta
    - term: "Validacao"
      definition: "Verificação automática de conformidade da Proposta com critérios técnicos (CNPJ, documentos obrigatórios, valores)"
      scope: "Neste BC = validação TÉCNICA automática. No BC 'contrato', 'Validacao' refere-se à validação JURÍDICA manual."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants: []
      commands: []
      examples:
        - "Validacao falhou: CNPJ inválido"
        - "Validacao bem-sucedida: todos os documentos presentes"
      notes: "NÃO confundir com 'Aprovacao' (que é decisão humana do Gestor)"

# ==============================================================================
# CONTEXT MAPPING
# Mapeamento de termos entre Bounded Contexts (tradução semântica)
# ==============================================================================

context_mappings:
  - source_bc: "[bc_origem]"
    target_bc: "[bc_destino]"
    relationship: "[Partnership | Shared-Kernel | Customer-Supplier | Conformist | Anti-Corruption-Layer]"
    shared_terms:
      - term: "[termo no BC origem]"
        translation: "[termo no BC destino]"
        note: "[Observações sobre a tradução]"

  # EXEMPLO CONCRETO:
  - source_bc: "licitacao"
    target_bc: "proposta"
    relationship: "Customer-Supplier"
    shared_terms:
      - term: "LicitacaoId"
        translation: "propostaLicitacaoId"
        note: "Mesmo conceito (ID da licitação), naming diferente por convenção do BC"

      - term: "Prazo de Submissao"
        translation: "Deadline"
        note: "BC 'proposta' usa termo em inglês por preferência do time"

  - source_bc: "proposta"
    target_bc: "contrato"
    relationship: "Anti-Corruption-Layer"
    shared_terms:
      - term: "Proposta Aprovada"
        translation: "Contrato Em Elaboracao"
        note: "Tradução semântica: aprovação no BC 'proposta' inicia elaboração no BC 'contrato'"

# ==============================================================================
# TERMOS AMBÍGUOS DETECTADOS
# Termos usados com múltiplos significados (a resolver)
# ==============================================================================

ambiguous_terms:
  - term: "[Termo Ambíguo]"
    issue: "[Descrição do problema de ambiguidade]"
    occurrences:
      - context: "[Onde foi usado]"
        meaning: "[Significado inferido]"
        timestamp: "YYYY-MM-DDTHH:MM:SS"
        agent: "[Quem usou]"
    resolution_status: "pending | resolved | wont-fix"
    resolution_notes: "[Como foi resolvido, se aplicável]"

  # EXEMPLO CONCRETO:
  - term: "Aprovacao"
    issue: "Usado com 3 significados diferentes: aprovação técnica, aprovação jurídica, aprovação final"
    occurrences:
      - context: "Analista mencionou: 'após aprovação, gera contrato'"
        meaning: "Provavelmente aprovação final (técnica + jurídica)"
        timestamp: "2026-04-15T10:30:00"
        agent: "Analista de Domínio"
      - context: "Cliente: 'Gestor faz aprovação rápida'"
        meaning: "Apenas aprovação técnica (não inclui jurídica)"
        timestamp: "2026-04-15T11:15:00"
        agent: "Cliente"
    resolution_status: "pending"
    resolution_notes: "Aguardando decisão: criar termos distintos (AprovacaoTecnica, AprovacaoJuridica) ou manter genérico?"

# ==============================================================================
# SEMANTIC DRIFT LOG
# Registro de desvios semânticos detectados pelo Guardião
# ==============================================================================

semantic_drift_log:
  - term: "[Termo]"
    drift_type: "[meaning-shift | scope-creep | synonym-introduction]"
    detected_at: "YYYY-MM-DDTHH:MM:SS"
    description: "[Descrição do drift]"
    glossary_definition: "[Definição no glossário]"
    observed_usage: "[Como estava sendo usado]"
    similarity_score: 0.72  # Cosine similarity (0-1, threshold típico: 0.85)
    corrective_action: "[O que foi feito para corrigir]"
    corrected_by: "[Guardião | Orquestrador | Analista]"

  # EXEMPLO CONCRETO:
  - term: "Proposta"
    drift_type: "synonym-introduction"
    detected_at: "2026-04-15T14:20:00"
    description: "Cliente começou a usar 'oferta' como sinônimo de 'Proposta'"
    glossary_definition: "Documento formal submetido por Licitante em resposta a Licitação"
    observed_usage: "Cliente: 'Empresa envia oferta com valor de R$ 100k'"
    similarity_score: 0.68
    corrective_action: "Guardião alertou, Analista corrigiu: 'oferta' → 'Proposta'"
    corrected_by: "Guardião (alerta) + Analista de Domínio (correção)"

# ==============================================================================
# FORBIDDEN PATTERNS
# Padrões de linguagem que devem ser evitados
# ==============================================================================

forbidden_patterns:
  - pattern: "[Padrão a evitar]"
    reason: "[Por que é proibido]"
    replacement: "[O que usar no lugar]"
    examples:
      - wrong: "[Exemplo errado]"
        correct: "[Exemplo correto]"

  # EXEMPLOS CONCRETOS:
  - pattern: "Usar 'status' genérico sem especificar contexto"
    reason: "Cada BC tem enum de status diferente, gera ambiguidade"
    replacement: "Usar 'StatusLicitacao', 'StatusProposta', 'StatusContrato'"
    examples:
      - wrong: "A licitação mudou de status"
        correct: "A licitação mudou de StatusLicitacao: ABERTA → FECHADA"

  - pattern: "Usar verbos genéricos (processar, validar, aprovar) sem objeto"
    reason: "Não fica claro O QUE está sendo processado/validado/aprovado"
    replacement: "Sempre especificar objeto: 'Validar Proposta', 'Aprovar Licitacao'"
    examples:
      - wrong: "Sistema valida e depois aprova"
        correct: "Sistema valida Proposta (CNPJ + documentos) e depois Gestor aprova Proposta"

# ==============================================================================
# VALIDATION RULES
# Regras de validação que o Guardião aplica
# ==============================================================================

validation_rules:
  - rule_id: "VR-001"
    rule_name: "Termo deve estar no glossário"
    severity: "error | warning | info"
    description: "Todo termo usado em conversas/documentos deve existir no glossário (global ou BC-específico)"
    action_on_violation: "Alertar agente, solicitar definição se novo termo"

  - rule_id: "VR-002"
    rule_name: "Forbidden synonyms não podem ser usados"
    severity: "error"
    description: "Termos em forbidden_synonyms geram erro e sugestão de termo correto"
    action_on_violation: "Bloquear (strict mode) ou alertar (permissive mode)"

  - rule_id: "VR-003"
    rule_name: "Aggregates devem ser usados no BC correto"
    severity: "error"
    description: "Aggregate de BC1 não pode ser usado diretamente em BC2 (apenas via ID ou tradução)"
    action_on_violation: "Alertar sobre violação de fronteira de BC, sugerir Anti-Corruption Layer"

  - rule_id: "VR-004"
    rule_name: "Termos ambíguos devem ser esclarecidos"
    severity: "warning"
    description: "Se termo está em ambiguous_terms, solicitar esclarecimento de contexto"
    action_on_violation: "Pausar workflow, solicitar ao Orquestrador decisão de resolução"

# ==============================================================================
# CHANGELOG
# Histórico de mudanças no glossário (Git-like)
# ==============================================================================

changelog:
  - version: "1.0"
    date: "YYYY-MM-DD"
    author: "[Nome]"
    changes: "Versão inicial do glossário"
    terms_added: []
    terms_modified: []
    terms_removed: []

  # EXEMPLO CONCRETO:
  - version: "1.1"
    date: "2026-04-15"
    author: "Guardião de Linguagem Ubíqua"
    changes: "Adicionado termo 'Validacao' com escopo diferenciado por BC"
    terms_added: ["Validacao"]
    terms_modified: []
    terms_removed: []

  - version: "1.2"
    date: "2026-04-16"
    author: "Analista de Domínio (Sofia)"
    changes: "Removido 'oferta' de forbidden_synonyms após decisão de usar 'Proposta'"
    terms_added: []
    terms_modified: ["Proposta"]
    terms_removed: []

# ==============================================================================
# STATISTICS (geradas automaticamente pelo Guardião)
# ==============================================================================

statistics:
  total_global_terms: 0
  total_bc_terms: 0
  total_ambiguous_terms: 0
  total_drift_incidents: 0
  conformity_rate: 0.00  # % de termos usados que estão no glossário
  last_drift_check: "YYYY-MM-DDTHH:MM:SS"
  most_violated_rule: "[VR-XXX]"

# ==============================================================================
# NOTES & BEST PRACTICES
# ==============================================================================

# BEST PRACTICES:
# 1. Sempre adicionar examples ao definir termo novo
# 2. Usar forbidden_synonyms agressivamente para prevenir drift
# 3. Documentar invariantes no Aggregate (ajuda QA de Specs)
# 4. Revisar ambiguous_terms semanalmente
# 5. Git commit do UBIQUITOUS_LANGUAGE.yaml após cada mudança significativa
# 6. Tag versions no Git quando glossário atingir milestones

# NAMING CONVENTIONS:
# - Termos: PascalCase para Aggregates/Entities, lowercase para outros
# - BCs: sempre lowercase (ex: licitacao, proposta)
# - Campos: camelCase (ex: licitacaoId, propostaLicitacaoId)

# INTEGRATION:
# - Este arquivo é lido por: Guardião, Analista, Arquitetos, QA
# - Este arquivo é escrito por: Guardião (primariamente), Analista (via Guardião)
# - Versionamento: Git (branch main = production glossary)

