      technical: "data_source: legado_cadastro_db"

# ==========================================
# CATEGORIA: Especificações e Artefatos
# ==========================================

- business_term: "Especificação de Processos"
  technical_term: "BPMN Spec / spec_processos.json"
  category: "artefato"
  context_hint: "Arquivo técnico com processos em formato BPMN 2.0"
  examples:
    - business: "Especificação de Processos"
      technical: "specs/spec_processos.json"

- business_term: "Especificação de Documentos/Dados"
  technical_term: "DDD Spec / YCL-domain / spec_documentos.json"
  category: "artefato"
  context_hint: "Arquivo técnico com documentos/domínio em formato YCL-domain da Ycodify"
  examples:
    - business: "Especificação de Documentos"
      technical: "specs/spec_documentos.json (formato YCL-domain)"

- business_term: "Especificação de Negócio"
  technical_term: "Business Requirements / ESPECIFICACAO_NEGOCIO.md"
  category: "artefato"
  context_hint: "Documento em linguagem natural descrevendo requisitos de negócio"
  examples:
    - business: "Especificação de Negócio"
      technical: "ESPECIFICACAO_NEGOCIO.md"

# ==========================================
# CATEGORIA: Relacionamentos e Estrutura
# ==========================================

- business_term: "Relacionamento 1:1"
  technical_term: "One-to-One Association"
  category: "relacionamento"
  context_hint: "Um documento se relaciona com exatamente um outro (ex: 'Pedido ↔ Fatura')"
  examples:
    - business: "Cada Pedido tem exatamente uma Fatura"
      technical: "association: Pedido 1:1 Fatura"

- business_term: "Relacionamento 1:N"
  technical_term: "One-to-Many Association"
  category: "relacionamento"
  context_hint: "Um documento se relaciona com vários outros (ex: 'Pedido → Itens')"
  examples:
