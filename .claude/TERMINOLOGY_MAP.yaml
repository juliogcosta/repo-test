# Terminology Map — Negócio ↔ Técnico (Conceitual)

## Instruções de Uso

### Para Orquestrador e Analista de Negócio
- **SEMPRE use termos da coluna `business_term`** ao falar com cliente
- **NUNCA exponha termos da coluna `technical_term`** ao cliente
- Use `context_hint` para esclarecer ambiguidades

### Para Arquitetos (Documentos e Processos)
- **Leia termos de negócio** da ESPECIFICACAO_NEGOCIO.md
- **Traduza para termos técnicos** usando este mapa
- **Documente mapeamento** em metadados (Seção 8 da ESPECIFICACAO_NEGOCIO.md)

### Para Guardião de Linguagem Ubíqua
- **Valide tradução bidirecional**: Garanta que termos de negócio sejam consistentemente mapeados
- **Detecte novos termos**: Se cliente usar termo não mapeado, sugira adição ao mapa
- **Enforce consistência**: Mesma entidade de negócio → mesmo ID técnico em todas as specs

### Para QA de Specs
- **Use para rastreabilidade semântica**: Validar que termo de negócio "X" foi traduzido para termo técnico "Y"
- **Detecte conflitos**: Se QA encontrar múltiplos mapeamentos, sinalizar inconsistência

