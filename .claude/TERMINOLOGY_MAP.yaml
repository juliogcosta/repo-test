## Mapeamento: Negócio → Técnico

```yaml
# ==========================================
# CATEGORIA: Estruturas de Domínio
# ==========================================

- business_term: "Módulo de Negócio"
  technical_term: "Bounded Context"
  category: "estrutura_dominio"
  context_hint: "Agrupamento de processos e documentos relacionados (ex: 'Licitações', 'Vendas')"
  examples:
    - business: "Módulo de Licitações"
      technical: "bounded_context: licitacao"
    - business: "Módulo de Vendas"
      technical: "bounded_context: vendas"

- business_term: "Documento Principal"
  technical_term: "Aggregate Root"
  category: "estrutura_dominio"
  context_hint: "Entidade principal que agrupa dados relacionados (ex: 'Proposta', 'Pedido')"
  examples:
    - business: "Documento: Proposta de Licitação"
      technical: "aggregate: Proposta"

- business_term: "Documento Auxiliar"
  technical_term: "Entity"
  category: "estrutura_dominio"
  context_hint: "Entidade que pertence a um documento principal mas tem identidade própria"
  examples:
    - business: "Item de Proposta"
      technical: "entity: ItemProposta (dentro do aggregate Proposta)"

- business_term: "Valor/Dado Simples"
  technical_term: "Value Object"
  category: "estrutura_dominio"
  context_hint: "Dado sem identidade própria (ex: CPF, endereço, moeda)"
  examples:
    - business: "CPF do cliente"
      technical: "value_object: CPF"
    - business: "Endereço de entrega"
      technical: "value_object: Endereco"

# ==========================================
# CATEGORIA: Regras de Negócio
# ==========================================

- business_term: "Regra de Negócio Obrigatória"
  technical_term: "Invariant"
  category: "regra_negocio"
  context_hint: "Regra que SEMPRE deve ser verdadeira para um documento (ex: 'Valor > 0')"
  examples:
    - business: "Proposta não pode ser editada após homologação"
      technical: "invariant: proposta_imutavel_pos_homologacao"
    - business: "Valor da proposta deve ser maior que zero"
      technical: "invariant: valor_proposta_positivo"

- business_term: "Validação de Campo"
  technical_term: "Field Validation"
  category: "regra_negocio"
  context_hint: "Regra de formato/range para um campo específico"
  examples:
    - business: "CPF deve ter 11 dígitos"
      technical: "field_validation: cpf_formato"
    - business: "Data de entrega deve ser futura"
      technical: "field_validation: data_entrega_futura"

- business_term: "Restrição de Processo"
  technical_term: "Process Constraint"
  category: "regra_negocio"
  context_hint: "Condição que controla execução de um processo (ex: 'Aprovação requer 2 assinaturas')"
  examples:
    - business: "Aprovação requer duas assinaturas"
      technical: "process_constraint: aprovacao_dupla_assinatura"

# ==========================================
# CATEGORIA: Processos e Fluxos
# ==========================================

- business_term: "Processo de Negócio"
  technical_term: "BPMN Process"
  category: "processo"
  context_hint: "Fluxo de trabalho completo (ex: 'Abertura de Licitação')"
  examples:
    - business: "Processo: Abertura de Licitação"
      technical: "bpmn_process: abertura_licitacao"

- business_term: "Etapa do Processo"
  technical_term: "BPMN Task"
  category: "processo"
  context_hint: "Atividade dentro de um processo (ex: 'Validar Documentação')"
  examples:
    - business: "Etapa: Validar Documentação"
      technical: "bpmn_task: validar_documentacao"

- business_term: "Decisão/Ponto de Escolha"
  technical_term: "BPMN Gateway (Exclusive)"
  category: "processo"
  context_hint: "Ponto onde processo toma decisão (ex: 'Aprovado ou Rejeitado?')"
  examples:
    - business: "Decisão: Proposta aprovada?"
      technical: "bpmn_gateway: proposta_aprovada_gateway"

- business_term: "Atividades Paralelas"
  technical_term: "BPMN Gateway (Parallel)"
  category: "processo"
  context_hint: "Múltiplas etapas executadas simultaneamente"
  examples:
    - business: "Enviar notificação E Gerar contrato (em paralelo)"
      technical: "bpmn_parallel_gateway: notificar_e_gerar_contrato"

- business_term: "Evento de Negócio"
  technical_term: "Domain Event"
  category: "processo"
  context_hint: "Algo que aconteceu no negócio e deve ser registrado (ex: 'Proposta Enviada')"
  examples:
