      technical: "actor: sistema_notificacoes"

# ==========================================
# CATEGORIA: Integrações e Fontes de Dados
# ==========================================

- business_term: "Sistema Externo/Integração"
  technical_term: "External System / Anti-Corruption Layer"
  category: "integracao"
  context_hint: "Sistema que fornece dados ou serviços (ex: 'API de Consulta de CPF')"
