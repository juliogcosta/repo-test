## Mapeamento Reverso: Técnico → Negócio

Este mapeamento é gerado automaticamente invertendo o mapeamento acima.
Usado quando Arquiteto gera specs técnicas e precisa referenciar termo de negócio original.

**Regra**: Se você vê `bounded_context: licitacao` → deve rastrear para "Módulo de Licitações" na ESPECIFICACAO_NEGOCIO.md

---

## Como Adicionar Novos Termos

Quando cliente usa termo de negócio NÃO mapeado:

1. **Guardião detecta**: "Cliente usou termo 'Fluxo de Aprovação Multinível' — não está no TERMINOLOGY_MAP"
2. **Guardião sugere mapeamento**: "Isso parece ser um 'Processo de Negócio' (BPMN Process). Confirma?"
3. **Cliente confirma**: Guardião adiciona entrada ao TERMINOLOGY_MAP.yaml
4. **Versionamento**: Incrementar version, atualizar last_updated

---

## Convenções de Naming Técnico

Para garantir consistência, IDs técnicos seguem padrões:

```yaml
naming_conventions:
  bounded_context_id: "^[a-z_]+$"  # ex: licitacao, vendas, gestao_contratos
  aggregate_id: "^[A-Z][a-zA-Z]+$"  # ex: Proposta, Pedido, Cliente
  entity_id: "^[A-Z][a-zA-Z]+$"  # ex: ItemProposta, EnderecoEntrega
  value_object_id: "^[A-Z][a-zA-Z]+$"  # ex: CPF, Email, Moeda
  command_id: "^[A-Z][a-zA-Z]+$"  # ex: EnviarProposta, AprovarPedido
  event_id: "^[A-Z][a-zA-Z]+$"  # ex: PropostaEnviada, PedidoAprovado
  invariant_id: "^[a-z_]+$"  # ex: proposta_imutavel_pos_homologacao
  process_id: "^[a-z_]+$"  # ex: abertura_licitacao, aprovacao_pedido
  task_id: "^[a-z_]+$"  # ex: validar_documentacao, enviar_notificacao
```

**Normalização**:
- "Módulo de Licitações" → `licitacao` (remove espaços, acentos, lowercase)
- "Proposta de Licitação" → `Proposta` (remove preposições, CamelCase para aggregates)
- "Enviar Proposta" → `EnviarProposta` (command em CamelCase)
- "Proposta foi enviada" → `PropostaEnviada` (event em CamelCase, tempo passado)

