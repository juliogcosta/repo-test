      technical: "domain_event: PropostaEnviada"
    - business: "Evento: Licitação foi homologada"
      technical: "domain_event: LicitacaoHomologada"

- business_term: "Ação/Operação"
  technical_term: "Command"
  category: "processo"
  context_hint: "Intenção de mudar estado do sistema (ex: 'Enviar Proposta')"
  examples:
    - business: "Ação: Enviar Proposta"
      technical: "command: EnviarProposta"
    - business: "Ação: Aprovar Licitação"
      technical: "command: AprovarLicitacao"

# ==========================================
# CATEGORIA: Papéis e Responsabilidades
# ==========================================

- business_term: "Papel/Responsável"
  technical_term: "Actor / Swimlane"
  category: "responsabilidade"
  context_hint: "Pessoa ou sistema responsável por executar etapa (ex: 'Gerente de Compras')"
  examples:
