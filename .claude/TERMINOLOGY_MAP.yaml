      technical: "association: Pedido 1:N ItemPedido"

- business_term: "Relacionamento N:N"
  technical_term: "Many-to-Many Association"
  category: "relacionamento"
  context_hint: "Múltiplos documentos se relacionam mutuamente (ex: 'Produtos ↔ Categorias')"
  examples:
    - business: "Produtos podem estar em várias Categorias"
      technical: "association: Produto N:N Categoria"
```

