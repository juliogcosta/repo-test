forbidden_patterns:
- pattern: Usar 'sala' como sinônimo de 'Projeto'
  reason: Sala é referência informal à UI (room do chat). Projeto é o conceito de domínio — pasta Git com agentes e artefatos.
    Confundir os dois dilui a fronteira entre UI e domínio.
  replacement: Usar 'sala do projeto' se referindo ao componente UI; usar 'Projeto' ao falar do conceito de domínio.
  examples:
  - wrong: A sala tem 3 sessões registradas.
    correct: O Projeto tem 3 sessões registradas.
  - wrong: Entrei na sala para ver os artefatos.
    correct: Entrei na sala do Projeto para ver os artefatos (Projeto contém os artefatos no repositório Git).
- pattern: Usar 'chatbot' ou 'assistente' para descrever o Ycognio
  reason: O Ycognio não é um chatbot genérico — é um wrapper sobre arquitetura de agentes especializada (Design Principle
    3.1.6). 'Chatbot' implica comportamento genérico e dilui o diferencial do produto.
  replacement: Usar 'Ycognio', 'webchat de elicitação assistida' ou 'interface de agentes'.
  examples:
  - wrong: O chatbot fez perguntas sobre o escopo.
    correct: O Orquestrador (agente Claude) fez perguntas sobre o escopo no Ycognio.
- pattern: Usar 'conversa', 'thread' ou 'ticket' no lugar de 'Sessão'
  reason: 'Sessão tem semântica de domínio específica: tem ciclo de vida, gera artefatos, pode ser retomada via H-B e é unidade
    de telemetria. Termos genéricos perdem essas propriedades.'
  replacement: Usar 'Sessão' (conceito de domínio) ou 'sessão de chat' (informal).
  examples:
  - wrong: Abri uma conversa nova para continuar o trabalho.
    correct: Iniciei uma nova Sessão com retomada do contexto da sessão anterior.
- pattern: Usar 'oferta', 'escopo', 'briefing' no lugar de 'PRD'
  reason: PRD é o termo técnico do output — tem estrutura definida (10 seções), critério de completude formal e ciclo de aprovação.
    Termos vagos impedem rastreabilidade com métricas BM-01/BM-03.
  replacement: Usar 'PRD' (formal) ou 'documento de requisitos' (muito informal, evitar).
  examples:
  - wrong: Vou enviar o escopo para o arquiteto.
    correct: Vou compartilhar o PRD aprovado com o Arquiteto Receptor.
validation_rules:
- rule_id: VR-001
  rule_name: Termo deve estar no glossário
  severity: warning
  description: Todo termo de domínio usado em conversas e documentos deve existir no glossário.
  action_on_violation: 'Alertar e solicitar definição se novo termo (validation_mode: permissive).'
- rule_id: VR-002
  rule_name: Forbidden synonyms não podem ser usados
  severity: error
  description: Termos em forbidden_synonyms de qualquer entrada do glossário geram alerta e sugestão do termo correto.
  action_on_violation: Alertar com termo correto (permissive mode).
- rule_id: VR-003
  rule_name: Design Principle 3.1.6 não pode ser violado em features
  severity: error
  description: Nenhuma feature do chat pode ter agência sobre os agentes Claude (controlar, reescrever, filtrar comportamento
    dos agentes).
  action_on_violation: Bloquear feature e solicitar reformulação.
- rule_id: VR-004
  rule_name: Papéis de Participante são lista fechada
  severity: error
  description: 'Papel de Participante deve ser exatamente um de: PO, YC Analyst, Guest. Qualquer outro papel é inválido.'
  action_on_violation: Rejeitar e corrigir para um dos três papéis válidos.
- rule_id: VR-005
  rule_name: Termos ambíguos devem ser esclarecidos
  severity: warning
  description: Se termo está em ambiguous_terms, solicitar esclarecimento de contexto.
  action_on_violation: Pausar e solicitar decisão de resolução.
