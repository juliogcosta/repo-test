semantic_drift_log: []

# ==============================================================================
# FORBIDDEN PATTERNS
# ==============================================================================

forbidden_patterns:
  - pattern: "Usar 'cliente' sem especificar se e Lead, Conta ou Contato"
    reason: "No dominio CRM, 'cliente' e ambiguo — pode ser Lead (potencial), Conta (empresa) ou Contato (pessoa)"
    replacement: "Usar Lead, Conta ou Contato conforme o contexto"
    examples:
      - wrong: "O cliente enviou uma mensagem"
        correct: "O Contato 'Maria Silva' da Conta 'Empresa XYZ' enviou uma mensagem"

  - pattern: "Usar 'status' sem prefixo de contexto"
    reason: "Lead e Oportunidade possuem enums de status diferentes"
    replacement: "Usar 'status do Lead' ou 'estagio da Oportunidade'"
    examples:
      - wrong: "Mudar o status para fechado"
        correct: "Marcar Oportunidade como Ganha (EstagioOportunidade = Ganha)"

  - pattern: "Usar 'negocio' como sinonimo de Oportunidade"
    reason: "Gera ambiguidade — 'negocio' pode ser empresa (Conta) ou oportunidade comercial"
    replacement: "Usar Oportunidade para o registro de negociacao e Conta para a empresa"
    examples:
      - wrong: "Fechei o negocio com a empresa"
        correct: "A Oportunidade foi marcada como Ganha para a Conta 'Empresa XYZ'"

# ==============================================================================
# VALIDATION RULES
# ==============================================================================

validation_rules:
  - rule_id: "VR-001"
    rule_name: "Termo deve estar no glossario"
    severity: "warning"
    description: "Todo termo de dominio usado em documentos deve existir no glossario"
    action_on_violation: "Alertar, solicitar definicao se novo termo"

  - rule_id: "VR-002"
    rule_name: "Forbidden synonyms nao podem ser usados"
    severity: "error"
    description: "Termos em forbidden_synonyms geram erro e sugestao de termo correto"
    action_on_violation: "Alertar (permissive mode)"

  - rule_id: "VR-003"
    rule_name: "Aggregates devem ser usados no BC correto"
    severity: "error"
    description: "Aggregate de BC1 nao pode ser usado diretamente em BC2 (apenas via ID)"
    action_on_violation: "Alertar sobre violacao de fronteira de BC"

  - rule_id: "VR-004"
    rule_name: "Termos ambiguos devem ser esclarecidos"
    severity: "warning"
    description: "Se termo esta em ambiguous_terms, solicitar esclarecimento de contexto"
    action_on_violation: "Registrar pendencia, continuar com flag [A DEFINIR]"

