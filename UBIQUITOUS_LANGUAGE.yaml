# ==============================================================================
# GLOSSARIO GLOBAL
# Termos compartilhados entre todos os Bounded Contexts
# ==============================================================================

global_terms:
  - term: "VendedorResponsavel"
    definition: "Usuario com perfil Vendedor designado como responsavel por um Lead ou Oportunidade. Determina visibilidade e accountability do registro."
    synonyms: []
    forbidden_synonyms: ["dono", "owner", "proprietario do lead"]
    type: "Role"
    related_terms: ["Lead", "Oportunidade", "GerenteComercial"]
    examples:
      - "O VendedorResponsavel pelo Lead recebe o alerta de 5 dias sem contato."
      - "A Oportunidade tem sempre um VendedorResponsavel, que pode ser redistribuido pelo Gerente."
    notes: "Papel desempenhado por usuario com perfil Vendedor. Diferente de 'criado_por'."
    added_date: "2026-04-30"
    added_by: "Analista de Negocio (Sofia)"

  - term: "Conversao"
    definition: "Ato de transformar um Lead qualificado em Conta + Oportunidade. Evento irreversivel que preserva o Lead como historico com estado Convertido."
    synonyms: []
    forbidden_synonyms: ["upgrade de lead", "promover lead", "transformar lead"]
    type: "Process"
    related_terms: ["Lead", "Conta", "Oportunidade", "LeadConvertido"]
    examples:
      - "Apos a Conversao, o Lead fica com status Convertido e uma Conta e uma Oportunidade sao criadas automaticamente."
    notes: "Transicao Qualificado -> Convertido. Nao confundir com 'criar Conta manualmente'."
    added_date: "2026-04-30"
    added_by: "Analista de Negocio (Sofia)"

# ==============================================================================
# GLOSSARIO POR BOUNDED CONTEXT
# ==============================================================================

bounded_context_terms:
  comercial:
    - term: "Lead"
      definition: "Registro de um potencial cliente capturado via formulario web ou entrada manual, antes de qualquer confirmacao de interesse ou qualificacao formal."
      scope: "Aggregate Root do BC comercial. Possui ciclo de vida proprio com estados definidos."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Lead Convertido ou Descartado nao pode mudar de estado."
        - "ultima_interacao_em e atualizado a cada interacao registrada."
        - "conta_id e oportunidade_id so sao preenchidos quando status = Convertido."
        - "Alerta disparado quando (agora - ultima_interacao_em) >= 5 dias e status nao e Convertido nem Descartado."
      commands:
        - command: "Criar Lead (formulario web)"
          event_result: "LeadCriado (criado_por = Sistema)"
        - command: "Criar Lead (manual)"
          event_result: "LeadCriado (criado_por = Vendedor | Gerente)"
        - command: "Converter Lead"
          event_result: "LeadConvertido + ContaCriada + OportunidadeCriada"
        - command: "Descartar Lead"
          event_result: "LeadDescartado"
      examples:
        - "Lead 'Empresa XYZ' chegou via formulario web com status Novo."
        - "Vendedor qualificou o Lead apos ligacao e moveu para Qualificado."
      notes: "Status possíveis: Novo, EmContato, Qualificado, Convertido, Descartado. Leads nunca sao excluidos."

    - term: "Conta"
      definition: "Representacao de uma empresa cliente no CRM. Criada automaticamente na Conversao de Lead ou manualmente pelo Gerente. Agrupa Contatos e Oportunidades."
      scope: "Aggregate Root do BC comercial."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Uma Conta pode ter N Contatos (1:N)."
        - "Uma Conta pode ter N Oportunidades ao longo do tempo."
      commands:
        - command: "Criar Conta"
          event_result: "ContaCriada"
      examples:
        - "Conta 'Ycodify Ltda' criada automaticamente apos conversao do Lead 'Julio Costa'."
      notes: "Modelo B2B. Suporte a contato sem conta (pessoa fisica) e Fase 2."

    - term: "Contato"
      definition: "Pessoa fisica vinculada a uma Conta, representando um interlocutor da empresa cliente. Nao e Aggregate Root — e entidade filha da Conta."
      scope: "Entidade filha de Conta no BC comercial."
      aggregate: false
      value_object: false
      entity: true
      domain_event: false
      invariants:
        - "Todo Contato pertence a uma Conta (conta_id obrigatorio no MVP)."
        - "Cada Conta possui exatamente um Contato marcado como principal (principal = true)."
      commands: []
      examples:
        - "Contato 'Maria Silva', cargo 'CEO', vinculada a Conta 'Empresa ABC'."
      notes: "Cardinalidade: 1 Conta : N Contatos. Suporte a Contato sem Conta e Fase 2."

    - term: "Oportunidade"
      definition: "Negociacao comercial em andamento com uma Conta, representando uma possibilidade concreta de venda. Possui estagio, valor estimado obrigatorio e pode resultar em Ganha ou Perdida."
      scope: "Aggregate Root do BC comercial."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "valor_estimado e sempre obrigatorio (nao pode ser nulo ou zero)."
        - "Oportunidade Ganha ou Perdida nao pode mudar de estagio."
        - "motivo_perda obrigatorio quando e somente quando estagio = Perdida."
        - "fechado_em preenchido somente quando estagio = Ganha ou Perdida."
      commands:
        - command: "Criar Oportunidade"
          event_result: "OportunidadeCriada"
        - command: "Marcar como Ganha"
          event_result: "OportunidadeGanha"
        - command: "Marcar como Perdida (com motivoPerda)"
          event_result: "OportunidadePerdida"
        - command: "Redistribuir Oportunidade"
          event_result: "OportunidadeResponsavelAlterado"
      examples:
        - "Oportunidade 'Implantacao CRM' para Conta 'Empresa XYZ', valor estimado R$ 50.000, estagio Negociacao."
      notes: "Estagios: PropostaEnviada, Negociacao, Fechamento, Ganha, Perdida."

    - term: "Pipeline"
      definition: "Visao agregada das Oportunidades ativas por estagio, representando o funil de vendas do time comercial."
      scope: "Read model / conceito de navegacao no BC comercial. Nao e Aggregate."
      aggregate: false
      value_object: false
      entity: false
      domain_event: false
      invariants: []
      commands: []
      examples:
        - "O Pipeline do Gerente mostra 5 oportunidades em PropostaEnviada, 3 em Negociacao, 2 em Fechamento."
      notes: "Representacao visual do funil. Dados derivados das Oportunidades com estagio != Ganha e != Perdida."

    - term: "EstagioOportunidade"
      definition: "Valor enumerado que representa a fase atual de uma Oportunidade no ciclo de vendas."
      scope: "Value Object no BC comercial."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Valores validos: PropostaEnviada, Negociacao, Fechamento, Ganha, Perdida."
        - "Transicao para Perdida exige motivo_perda preenchido."
      commands: []
      examples:
        - "EstagioOportunidade transicionou de Negociacao para Fechamento."
      notes: "Progride linearmente PropostaEnviada -> Negociacao -> Fechamento -> Ganha|Perdida."

    - term: "MotivoPerda"
      definition: "Texto livre obrigatorio preenchido pelo Vendedor ou Gerente Comercial ao marcar uma Oportunidade como Perdida, descrevendo a razao do nao-fechamento."
      scope: "Value Object no BC comercial. Atributo da Oportunidade."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Obrigatorio quando e somente quando EstagioOportunidade = Perdida."
        - "Texto livre — sem lista de valores fixos no MVP."
      commands: []
      examples:
        - "MotivoPerda: 'Cliente optou por solucao concorrente com menor custo'."
        - "MotivoPerda: 'Orcamento cancelado por restricoes internas'."
      notes: "Lista fixa de motivos e possivel refinamento para ciclo futuro."

    - term: "ValorEstimado"
      definition: "Valor monetario em reais (R$) que representa a estimativa do negocio a ser fechado em uma Oportunidade. Campo obrigatorio."
      scope: "Value Object no BC comercial. Atributo da Oportunidade."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Sempre obrigatorio na Oportunidade — nao pode ser nulo."
        - "Unidade monetaria: BRL (Real Brasileiro)."
      commands: []
      examples:
        - "ValorEstimado: R$ 120.000,00 para contrato anual de plataforma."
      notes: "No MVP e estimativa do vendedor. Refinamento (valor contratado vs estimado) e ciclo futuro."

    - term: "HistoricoVenda"
      definition: "Projecao (read model) derivada de todas as Oportunidades com estagio = Ganha. Apresenta registros individuais e metricas agregadas. Nao e uma entidade com escrita propria."
      scope: "Projection / Query Model no BC comercial. Nao e Aggregate."
      aggregate: false
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Somente leitura — nenhuma alteracao e permitida."
        - "Dados derivados de Oportunidades Ganhas. Nao ha tabela/colecao independente."
        - "Visibilidade segue a mesma matriz de perfis das Oportunidades."
      commands: []
      examples:
        - "HistoricoVenda exibe total de R$ 350.000 em vendas do trimestre para o Gestor."
        - "Vendedor ve apenas suas proprias Oportunidades Ganhas no HistoricoVenda."
      notes: "Conceito CQRS: separacao leitura/escrita. Dados originados no Aggregate Oportunidade."

    - term: "OportunidadeGanha"
      definition: "Evento de dominio disparado quando uma Oportunidade transiciona para o estagio Ganha. Aciona envio de e-mail para Engenharia (MVP) e futura integracao sistemica (Pos-MVP)."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      invariants:
        - "Irreversivel — Oportunidade Ganha nao pode mudar de estagio."
      commands: []
      examples:
        - "OportunidadeGanha disparado: CRM envia e-mail automatico para equipe de Engenharia."
      notes: "Evento de negocio de alta relevancia. Inicia o fluxo pos-venda na Engenharia."

    - term: "OportunidadePerdida"
      definition: "Evento de dominio disparado quando uma Oportunidade transiciona para o estagio Perdida, com motivo_perda obrigatorio registrado."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      invariants:
        - "Irreversivel — Oportunidade Perdida nao pode mudar de estagio."
        - "So pode ser disparado se motivo_perda foi fornecido."
      commands: []
      examples:
        - "OportunidadePerdida disparado com motivo: 'Preco acima do orcamento do cliente'."
      notes: ""

  posvenda:
    - term: "Ticket"
      definition: "Registro de solicitacao de suporte ou atendimento pos-venda vinculado a uma Conta. Detalhamento adiado para Fase 2."
      scope: "Aggregate Root do BC posvenda — Fase 2, fora do MVP."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants: []
      commands: []
      examples:
        - "Ticket aberto pela Conta 'Empresa XYZ' reportando problema de acesso."
      notes: "BC posvenda completo e Fase 2. Nao detalhar no MVP."

