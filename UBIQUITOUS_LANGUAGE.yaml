metadata:
  project: "crm"
  version: "1.3"
  last_updated: "2026-05-05"
  maintainer: "Analista de Negocio (Sofia) + Guardiao de Linguagem Ubiqua"
  bounded_contexts:
    - "comercial"
    - "posvenda"

# ==============================================================================
# GLOSSARIO GLOBAL
# Termos compartilhados entre todos os Bounded Contexts
# ==============================================================================

global_terms:
  - term: "VendedorResponsavel"
    definition: "Usuario com perfil Vendedor designado como responsavel por um Lead ou Oportunidade. Determina visibilidade e accountability do registro."
    synonyms: []
    forbidden_synonyms: ["dono", "owner", "proprietario do lead"]
    type: "Role"
    related_terms: ["Lead", "Oportunidade", "GerenteComercial"]
    examples:
      - "O VendedorResponsavel pelo Lead recebe o alerta de 5 dias sem contato."
      - "A Oportunidade tem sempre um VendedorResponsavel, que pode ser redistribuido pelo Gerente."
    notes: "Papel desempenhado por usuario com perfil Vendedor. Diferente de 'criado_por'."
    added_date: "2026-04-30"
    added_by: "Analista de Negocio (Sofia)"

  - term: "Conversao"
    definition: "Ato de transformar um Lead qualificado em Conta + Oportunidade. Evento irreversivel que preserva o Lead como historico com estado Convertido."
    synonyms: []
    forbidden_synonyms: ["upgrade de lead", "promover lead", "transformar lead"]
    type: "Process"
    related_terms: ["Lead", "Conta", "Oportunidade", "LeadConvertido"]
    examples:
      - "Apos a Conversao, o Lead fica com status Convertido e uma Conta e uma Oportunidade sao criadas automaticamente."
    notes: "Transicao Qualificado -> Convertido. Nao confundir com 'criar Conta manualmente'."
    added_date: "2026-04-30"
    added_by: "Analista de Negocio (Sofia)"

  - term: "Gestor"
    definition: "Usuario com perfil estrategico que possui visibilidade irrestrita e consolidada de todos os registros do CRM (Leads, Contas, Contatos, Oportunidades, HistoricoVenda) de todos os times. Nao opera registros diretamente — sua funcao e analise e decisao gerencial."
    synonyms: []
    forbidden_synonyms: ["admin", "administrador"]
    type: "Role"
    related_terms: ["GerenteComercial"]
    examples:
      - "Gestor visualiza metricas agregadas de HistoricoVenda por periodo e por Vendedor."
      - "Gestor acompanha pipeline completo de todas as equipes comerciais."
    notes: "Perfil de leitura irrestrita. Diferente de GerenteComercial (que opera registros do seu time)."
    added_date: "2026-05-05"
    added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

# ==============================================================================
# GLOSSARIO POR BOUNDED CONTEXT
# ==============================================================================

bounded_context_terms:
  comercial:
    - term: "Lead"
      definition: "Registro de um potencial cliente capturado via formulario web ou entrada manual, antes de qualquer confirmacao de interesse ou qualificacao formal."
      scope: "Aggregate Root do BC comercial. Possui ciclo de vida proprio com estados definidos."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Lead Convertido ou Descartado nao pode mudar de estado."
        - "ultima_interacao_em e atualizado a cada interacao registrada."
        - "conta_id e oportunidade_id so sao preenchidos quando status = Convertido."
        - "Alerta disparado quando (agora - ultima_interacao_em) >= 5 dias e status nao e Convertido nem Descartado."
      commands:
        - command: "Criar Lead (formulario web)"
          event_result: "LeadCriado (criado_por = Sistema)"
        - command: "Criar Lead (manual)"
          event_result: "LeadCriado (criado_por = Vendedor | Gerente)"
        - command: "Converter Lead"
          event_result: "LeadConvertido + ContaCriada + OportunidadeCriada"
        - command: "Descartar Lead"
          event_result: "LeadDescartado"
      examples:
        - "Lead 'Empresa XYZ' chegou via formulario web com status Novo."
        - "Vendedor qualificou o Lead apos ligacao e moveu para Qualificado."
      notes: "Status possíveis: Novo, EmContato, Qualificado, Convertido, Descartado. Leads nunca sao excluidos."

    - term: "Conta"
      definition: "Representacao de uma empresa cliente no CRM. Criada automaticamente na Conversao de Lead ou manualmente pelo Gerente. Agrupa Contatos e Oportunidades."
      scope: "Aggregate Root do BC comercial."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "Uma Conta pode ter N Contatos (1:N)."
        - "Uma Conta pode ter N Oportunidades ao longo do tempo."
      commands:
        - command: "Criar Conta"
          event_result: "ContaCriada"
      examples:
        - "Conta 'Ycodify Ltda' criada automaticamente apos conversao do Lead 'Julio Costa'."
      notes: "Modelo B2B. Suporte a contato sem conta (pessoa fisica) e Fase 2."

    - term: "Contato"
      definition: "Pessoa fisica vinculada a uma Conta, representando um interlocutor da empresa cliente. Nao e Aggregate Root — e entidade filha da Conta."
      scope: "Entidade filha de Conta no BC comercial."
      aggregate: false
      value_object: false
      entity: true
      domain_event: false
      invariants:
        - "Todo Contato pertence a uma Conta (conta_id obrigatorio no MVP)."
        - "Cada Conta possui exatamente um Contato marcado como principal (principal = true)."
      commands: []
      examples:
        - "Contato 'Maria Silva', cargo 'CEO', vinculada a Conta 'Empresa ABC'."
      notes: "Cardinalidade: 1 Conta : N Contatos. Suporte a Contato sem Conta e Fase 2."

    - term: "Oportunidade"
      definition: "Negociacao comercial em andamento com uma Conta, representando uma possibilidade concreta de venda. Possui estagio, valor estimado obrigatorio e pode resultar em Ganha ou Perdida."
      scope: "Aggregate Root do BC comercial."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants:
        - "valor_estimado e sempre obrigatorio (nao pode ser nulo ou zero)."
        - "Oportunidade Ganha ou Perdida nao pode mudar de estagio."
        - "motivo_perda obrigatorio quando e somente quando estagio = Perdida."
        - "fechado_em preenchido somente quando estagio = Ganha ou Perdida."
      commands:
        - command: "Criar Oportunidade"
          event_result: "OportunidadeCriada"
        - command: "Marcar como Ganha"
          event_result: "OportunidadeGanha"
        - command: "Marcar como Perdida (com motivoPerda)"
          event_result: "OportunidadePerdida"
        - command: "Redistribuir Oportunidade"
          event_result: "OportunidadeResponsavelAlterado"
      examples:
        - "Oportunidade 'Implantacao CRM' para Conta 'Empresa XYZ', valor estimado R$ 50.000, estagio Negociacao."
      notes: "Estagios: PropostaEnviada, Negociacao, Fechamento, Ganha, Perdida."

    - term: "Pipeline"
      definition: "Visao agregada das Oportunidades ativas por estagio, representando o funil de vendas do time comercial."
      scope: "Read model / conceito de navegacao no BC comercial. Nao e Aggregate."
      aggregate: false
      value_object: false
      entity: false
      domain_event: false
      invariants: []
      commands: []
      examples:
        - "O Pipeline do Gerente mostra 5 oportunidades em PropostaEnviada, 3 em Negociacao, 2 em Fechamento."
      notes: "Representacao visual do funil. Dados derivados das Oportunidades com estagio != Ganha e != Perdida."

    - term: "EstagioOportunidade"
      definition: "Valor enumerado que representa a fase atual de uma Oportunidade no ciclo de vendas."
      scope: "Value Object no BC comercial."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Valores validos: PropostaEnviada, Negociacao, Fechamento, Ganha, Perdida."
        - "Transicao para Perdida exige motivo_perda preenchido."
      commands: []
      examples:
        - "EstagioOportunidade transicionou de Negociacao para Fechamento."
      notes: "Progride linearmente PropostaEnviada -> Negociacao -> Fechamento -> Ganha|Perdida."

    - term: "MotivoPerda"
      definition: "Texto livre obrigatorio preenchido pelo Vendedor ou Gerente Comercial ao marcar uma Oportunidade como Perdida, descrevendo a razao do nao-fechamento."
      scope: "Value Object no BC comercial. Atributo da Oportunidade."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Obrigatorio quando e somente quando EstagioOportunidade = Perdida."
        - "Texto livre — sem lista de valores fixos no MVP."
      commands: []
      examples:
        - "MotivoPerda: 'Cliente optou por solucao concorrente com menor custo'."
        - "MotivoPerda: 'Orcamento cancelado por restricoes internas'."
      notes: "Lista fixa de motivos e possivel refinamento para ciclo futuro."

    - term: "ValorEstimado"
      definition: "Valor monetario em reais (R$) que representa a estimativa do negocio a ser fechado em uma Oportunidade. Campo obrigatorio."
      scope: "Value Object no BC comercial. Atributo da Oportunidade."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      invariants:
        - "Sempre obrigatorio na Oportunidade — nao pode ser nulo."
        - "Unidade monetaria: BRL (Real Brasileiro)."
      commands: []
      examples:
        - "ValorEstimado: R$ 120.000,00 para contrato anual de plataforma."
      notes: "No MVP e estimativa do vendedor. Refinamento (valor contratado vs estimado) e ciclo futuro."

    - term: "HistoricoVenda"
      definition: "Projecao (read model) derivada de todas as Oportunidades com estagio = Ganha. Apresenta registros individuais e metricas agregadas. Nao e uma entidade com escrita propria."
      scope: "Projection / Query Model no BC comercial. Nao e Aggregate."
      aggregate: false
      value_object: false
      entity: false
      domain_event: false
      synonyms:
        - "Histórico de Vendas"
      invariants:
        - "Somente leitura — nenhuma alteracao e permitida."
        - "Dados derivados de Oportunidades Ganhas. Nao ha tabela/colecao independente."
        - "Visibilidade segue a mesma matriz de perfis das Oportunidades."
      commands: []
      examples:
        - "HistoricoVenda exibe total de R$ 350.000 em vendas do trimestre para o Gestor."
        - "Vendedor ve apenas suas proprias Oportunidades Ganhas no HistoricoVenda."
      notes: "Conceito CQRS: separacao leitura/escrita. Dados originados no Aggregate Oportunidade."

    - term: "OportunidadeGanha"
      definition: "Evento de dominio disparado quando uma Oportunidade transiciona para o estagio Ganha. Aciona envio de e-mail para Engenharia (MVP) e futura integracao sistemica (Pos-MVP)."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      invariants:
        - "Irreversivel — Oportunidade Ganha nao pode mudar de estagio."
      commands: []
      examples:
        - "OportunidadeGanha disparado: CRM envia e-mail automatico para equipe de Engenharia."
      notes: "Evento de negocio de alta relevancia. Inicia o fluxo pos-venda na Engenharia."

    - term: "OportunidadePerdida"
      definition: "Evento de dominio disparado quando uma Oportunidade transiciona para o estagio Perdida, com motivo_perda obrigatorio registrado."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      invariants:
        - "Irreversivel — Oportunidade Perdida nao pode mudar de estagio."
        - "So pode ser disparado se motivo_perda foi fornecido."
      commands: []
      examples:
        - "OportunidadePerdida disparado com motivo: 'Preco acima do orcamento do cliente'."
      notes: ""

    - term: "GerenteComercial"
      definition: "Usuario com perfil de gerencia que supervisiona o time comercial. Tem visibilidade de todos os Leads, Contas, Oportunidades e HistoricoVenda do time. Pode criar, redistribuir e converter Leads e Oportunidades. Recebe notificacoes de alertas do time (ex.: Lead sem interacao ha 5 dias)."
      scope: "Role no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: false
      type: "Role"
      related_terms: ["Gestor", "VendedorResponsavel"]
      examples:
        - "GerenteComercial redistribui Oportunidade de Vendedor afastado para outro Vendedor."
        - "GerenteComercial recebe notificacao de Lead sem contato ha 5 dias."
      notes: "Diferente de Gestor: GerenteComercial opera registros do seu time; Gestor apenas consulta de forma irrestrita."
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "StatusLead"
      definition: "Valor enumerado representando a fase atual do Lead no ciclo de captacao e qualificacao. Determina as transicoes permitidas e as regras de negocio aplicaveis."
      scope: "Value Object no BC comercial."
      aggregate: false
      value_object: true
      entity: false
      domain_event: false
      type: "ValueObject"
      values:
        - "Novo"
        - "EmContato"
        - "Qualificado"
        - "Convertido"
        - "Descartado"
      related_terms: ["Lead", "EstagioOportunidade"]
      examples:
        - "Lead recem-criado via formulario web → StatusLead = Novo."
        - "Vendedor registra primeiro contato → StatusLead = EmContato."
      notes: "Usar PascalCase sem espaco para valores de enum (EmContato, nao 'Em Contato'). Forma natural 'Em Contato' e aceitavel apenas em prosa/UI."
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "LeadCriado"
      definition: "Evento de dominio disparado ao criar um Lead, independente da origem (formulario web ou entrada manual por Vendedor/GerenteComercial). Registra origem, responsavel e timestamp de criacao."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Lead", "LeadConvertido"]
      examples:
        - "Sistema recebe submissao de formulario web → dispara LeadCriado com origem=formulario_web."
        - "Vendedor cria Lead manualmente → dispara LeadCriado com origem=manual."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "LeadConvertido"
      definition: "Evento de dominio disparado ao transicionar Lead para StatusLead=Convertido. Aciona automaticamente a criacao de uma Conta (se nao existente) e de uma Oportunidade vinculada."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Lead", "OportunidadeCriada", "ContaCriada", "Conversao"]
      examples:
        - "Vendedor qualifica Lead e executa conversao → dispara LeadConvertido → sistema cria Conta + Oportunidade."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "LeadDescartado"
      definition: "Evento de dominio disparado ao transicionar Lead para StatusLead=Descartado. O Lead e preservado como historico — nao e removido do sistema."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Lead", "LeadConvertido"]
      examples:
        - "Vendedor descarta Lead sem fit → dispara LeadDescartado → Lead permanece com StatusLead=Descartado para auditoria."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "OportunidadeCriada"
      definition: "Evento de dominio disparado ao criar uma Oportunidade, seja via conversao de Lead (automatico) ou por criacao direta pelo GerenteComercial. Estagio inicial e sempre PropostaEnviada."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Oportunidade", "LeadConvertido", "OportunidadeGanha"]
      examples:
        - "LeadConvertido dispara criacao automatica → OportunidadeCriada com estagio=PropostaEnviada."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "OportunidadeResponsavelAlterado"
      definition: "Evento de dominio disparado quando o GerenteComercial redistribui uma Oportunidade, alterando o VendedorResponsavel. Registrado para auditoria e rastreabilidade da cadeia de responsabilidade."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Oportunidade", "VendedorResponsavel", "GerenteComercial"]
      examples:
        - "GerenteComercial reatribui Oportunidade de Vendedor afastado → OportunidadeResponsavelAlterado registrado com vendedor_anterior e vendedor_novo."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "ContaCriada"
      definition: "Evento de dominio disparado ao criar uma Conta, seja automaticamente via conversao de Lead ou manualmente pelo GerenteComercial. O VendedorResponsavel da Conta e herdado do Lead de origem na conversao automatica."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["Conta", "LeadConvertido", "VendedorResponsavel"]
      examples:
        - "LeadConvertido dispara criacao de Conta → ContaCriada com vendedor_responsavel_id herdado do Lead."
      notes: "Resolve INCONSISTENCIA-04: VendedorResponsavel da Conta e herdado do Lead na conversao automatica. Em criacao manual pelo GerenteComercial, o campo deve ser preenchido explicitamente."
      added_date: "2026-05-05"
      added_by: "Guardiao de Linguagem Ubiqua (Lexicon)"

    - term: "SolicitacaoSubstituicao"
      definition: "Registro formal da solicitacao de um Vendedor para ser substituido na conducao de um Lead ou Oportunidade. Passa pelos estados Pendente → Aprovada | Recusada, com decisao e escolha do substituto pelo GerenteComercial."
      scope: "Aggregate Root no BC comercial."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      type: "Aggregate"
      invariants:
        - "motivo nao pode ser nulo ou vazio."
        - "lead_id ou oportunidade_id deve estar preenchido (pelo menos um)."
        - "vendedor_substituto_id obrigatorio quando status = Aprovada."
        - "status inicial = Pendente."
        - "Apenas o proprio Vendedor pode criar SolicitacaoSubstituicao para seus proprios registros."
      related_terms: ["Lead", "Oportunidade", "VendedorResponsavel", "GerenteComercial", "SubstituicaoSolicitada", "SubstituicaoAprovada", "SubstituicaoRecusada"]
      examples:
        - "Vendedor abre SolicitacaoSubstituicao para Lead 'Empresa XYZ' com motivo 'conflito de agenda permanente'."
        - "GerenteComercial aprova SolicitacaoSubstituicao e designa VendedorSubstituto — Lead e Oportunidade sao reatribuidos."
      notes: "Distinto de FR-014 (redistribuicao por iniciativa do Gerente). SolicitacaoSubstituicao e iniciativa do proprio Vendedor. Fluxos coexistem."
      added_date: "2026-05-05"
      added_by: "Analista de Negocio (Sofia)"

    - term: "SubstituicaoSolicitada"
      definition: "Evento de dominio disparado quando Vendedor submete solicitacao de substituicao com motivo preenchido. Coloca SolicitacaoSubstituicao em estado Pendente e notifica o GerenteComercial."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["SolicitacaoSubstituicao", "SubstituicaoAprovada", "SubstituicaoRecusada"]
      examples:
        - "Vendedor confirma solicitacao → SubstituicaoSolicitada disparado → GerenteComercial notificado com dados do Lead/Oportunidade e motivo."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Analista de Negocio (Sofia)"

    - term: "SubstituicaoAprovada"
      definition: "Evento de dominio disparado quando GerenteComercial aprova a SolicitacaoSubstituicao e designa VendedorSubstituto. Aciona reatribuicao de Lead e Oportunidade vinculada ao substituto."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["SolicitacaoSubstituicao", "SubstituicaoSolicitada", "VendedorResponsavel", "GerenteComercial"]
      examples:
        - "GerenteComercial aprova solicitacao e escolhe substituto → SubstituicaoAprovada disparado → Lead e Oportunidade reatribuidos ao VendedorSubstituto."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Analista de Negocio (Sofia)"

    - term: "SubstituicaoRecusada"
      definition: "Evento de dominio disparado quando GerenteComercial recusa a SolicitacaoSubstituicao. VendedorResponsavel permanece inalterado. Vendedor solicitante e notificado."
      scope: "Domain Event no BC comercial."
      aggregate: false
      value_object: false
      entity: false
      domain_event: true
      type: "DomainEvent"
      related_terms: ["SolicitacaoSubstituicao", "SubstituicaoSolicitada", "VendedorResponsavel", "GerenteComercial"]
      examples:
        - "GerenteComercial recusa solicitacao → SubstituicaoRecusada disparado → VendedorResponsavel permanece o mesmo → Vendedor solicitante notificado."
      notes: ""
      added_date: "2026-05-05"
      added_by: "Analista de Negocio (Sofia)"

  posvenda:
    - term: "Ticket"
      definition: "Registro de solicitacao de suporte ou atendimento pos-venda vinculado a uma Conta. Detalhamento adiado para Fase 2."
      scope: "Aggregate Root do BC posvenda — Fase 2, fora do MVP."
      aggregate: true
      value_object: false
      entity: false
      domain_event: false
      invariants: []
      commands: []
      examples:
        - "Ticket aberto pela Conta 'Empresa XYZ' reportando problema de acesso."
      notes: "BC posvenda completo e Fase 2. Nao detalhar no MVP."

