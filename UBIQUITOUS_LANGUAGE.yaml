context_mappings:
  - source_bc: "comercial"
    target_bc: "posvenda"
    relationship: "Customer-Supplier"
    shared_terms:
      - term: "Conta"
        translation: "Conta (referencia por ID)"
        note: "BC posvenda referencia Conta por conta_id. Nao acessa o Aggregate diretamente."

# ==============================================================================
